<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account - Smart Notes</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

</head>

<body>

<nav class="navbar">

<div class="logo">
📝 Smart Notes
</div>

<ul>

<li><a href="index.html">Home</a></li>

<li><a href="login.html">Login</a></li>

</ul>

</nav>

<div class="login-container">

<div class="login-card">

<h1>Create Account 🚀</h1>

<input
type="text"
id="name"
placeholder="Full Name"
>

<input
type="email"
id="email"
placeholder="Email Address"
>

<input
type="password"
id="password"
placeholder="Create Password"
>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
>

<button
id="signupBtn"
class="btn">
Create Account
</button>

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

</div>
<script>

const firebaseConfig = {

apiKey: "AIzaSyA80eIasPvzWwKyNyTfoyD4hN2ooRQMYdk",

authDomain: "smart-notes-a7df6.firebaseapp.com",

projectId: "smart-notes-a7df6",

storageBucket: "smart-notes-a7df6.firebasestorage.app",

messagingSenderId: "296494031683",

appId: "1:296494031683:web:60101c18dab215ea5905f6"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

document.getElementById("signupBtn").addEventListener("click", function(){

const email = document.getElementById("email").value.trim();

const password = document.getElementById("password").value;

const confirm = document.getElementById("confirmPassword").value;

if(email==="" || password==="" || confirm===""){

alert("Please fill all fields");

return;

}

if(password!==confirm){

alert("Passwords do not match!");

return;

}

auth.createUserWithEmailAndPassword(email,password)

.then(function(){

alert("🎉 Account Created Successfully!");

window.location.href="login.html";

})

.catch(function(error){

alert(error.message);

});

});

</script>

</body>

</html>
